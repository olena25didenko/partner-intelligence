# =========================================================================
# Partner configuration for Infinitopes Partner Intelligence Dashboard
# =========================================================================
# To add a partner: copy the block below the last partner, fill in the fields.
# Required: name, website.
# Recommended: ticker, cik (leave blank for non-US-listed), hq, focus,
#              our_contact, tier.
#
# Where to find the SEC CIK number:
#   https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&company=<name>
#   Leave cik blank ("") for companies that don't file with the SEC
#   (Merck KGaA, Roche, etc). The SEC tab will show a friendly "not applicable"
#   note for them.
# =========================================================================

